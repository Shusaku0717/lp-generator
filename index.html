const hexToHsl = hex => {
  let r=parseInt(hex.slice(1,3),16)/255, g=parseInt(hex.slice(3,5),16)/255, b=parseInt(hex.slice(5,7),16)/255;
  const mx=Math.max(r,g,b), mn=Math.min(r,g,b), l=(mx+mn)/2;
  if(mx===mn) return {h:0,s:0,l:l*100};
  const d=mx-mn, s=l>0.5?d/(2-mx-mn):d/(mx+mn);
  let h;
  if(mx===r) h=(g-b)/d+(g<b?6:0);
  else if(mx===g) h=(b-r)/d+2;
  else h=(r-g)/d+4;
  return {h:h*60, s:s*100, l:l*100};
};
const hslToHex = (h,s,l) => {
  s/=100; l/=100;
  const a=s*Math.min(l,1-l);
  const f=n=>{const k=(n+h/30)%12; return l-a*Math.max(-1,Math.min(k-3,9-k,1));};
  return '#'+[f(0),f(8),f(4)].map(x=>Math.round(Math.max(0,Math.min(255,x*255))).toString(16).padStart(2,'0')).join('');
};
const deriveColors = main => {
  const {h, s} = hexToHsl(main);
  const ts = Math.min(s, 22);
  const accentH = (h + 180) % 360;
  return {
    colorMain:   main,
    colorBg:     hslToHex(h, ts,    96),
    colorLight:  hslToHex(h, ts+8,  91),
    colorAccent: hslToHex(accentH, 75, 48),
    colorText:   hslToHex(h, Math.min(s, 70), 16),
  };
};

function buildHtml(form, res, img, design, directorImg, clinicImg) {
  const D = { ...DEFAULT_DESIGN, ...design };
  const C  = D.colorMain;
  const CL = D.colorLight;
  const BG = D.colorBg;
  const TX = D.colorText;
  const CA = D.colorAccent || "#F39800";
  const FS = D.fontSize;
  const RC = D.radiusCard;
  const RB = D.radiusBtn;
  const SP = D.sectionPad;
  const HH = D.heroHeight;

  const heroLines  = (res.hero||"").split("\n").filter(l=>l.trim());
  const heroTitle  = heroLines[0] || form.clinicName || "地域の整骨院";
  const heroSub    = heroLines[1] || "";
  const heroChecks = heroLines.slice(2).filter(l=>l.trim()).slice(0,3);

  const tags = (res.pain||"").split(/[\n、,，・]/).map(t=>t.trim()).filter(t=>t&&t.length<15).slice(0,20)
    .map(t=>`<span class="tag">${t}</span>`).join("");

  const courses = (res.menu||form.price||"").split("\n").filter(l=>l.trim()).map(l=>{
    const c = l.replace(/^[・\-\*\d\.\s]+/,"").trim();
    const p = c.split(/[：:]/);
    return `<div class="c-row"><span class="c-name">${p[0]||c}</span><span class="c-price">${p[1]||""}</span></div>`;
  }).join("");

  const reasons = (()=>{
    const lines=(res.features||"").split("\n").filter(l=>l.trim());
    const blocks=[]; let cur=null;
    for(const l of lines){
      if(/^\d[\.．]/.test(l)){if(cur)blocks.push(cur);cur={t:l.replace(/^\d[\.．]\s*/,""),b:[]};}
      else if(cur)cur.b.push(l);
    }
    if(cur)blocks.push(cur);
    if(!blocks.length){for(let i=0;i<lines.length;i+=2)blocks.push({t:lines[i]||"",b:[lines[i+1]||""]});}
    return blocks.slice(0,3).map((b,i)=>`<div class="r-card"><div class="r-num">0${i+1}</div><div class="r-title">${b.t}</div><div class="r-body">${b.b.join(" ")}</div></div>`).join("");
  })();

  const voices = (()=>{
    const lines=(res.voice||"").split("\n").filter(l=>l.trim());
    const items=[]; let cur=null;
    for(const l of lines){
      if(/^\d[\.．]/.test(l)){if(cur)items.push(cur);cur={m:l.replace(/^\d[\.．]\s*/,""),c:[]};}
      else if(cur)cur.c.push(l);
    }
    if(cur)items.push(cur);
    const icon = (meta, idx) => {
      const female = /女/.test(meta);
      const male   = /男/.test(meta);
      const char   = female ? "女" : male ? "男" : (meta.replace(/[\d代\s\/／・]/g,"")[0]||"患");
      const idxColors = [C, CA, C];
      const bg     = female ? C : male ? CA : idxColors[idx % idxColors.length];
      return `<div class="v-icon" style="background:${bg}">${char}</div>`;
    };
    if(!items.length) return `<div class="v-card">${icon("女性",0)}<div><div class="v-meta">40代 女性 ／ 腰痛</div><p class="v-text">長年悩んでいた腰痛がすっかり楽になりました。</p></div></div>`;
    return items.slice(0,3).map((v,i)=>`<div class="v-card">${icon(v.m,i)}<div><div class="v-meta">${v.m}</div><p class="v-text">${v.c.join(" ")}</p></div></div>`).join("");
  })();

  const steps = (()=>{
    const lines=(res.flow||"").split("\n").filter(l=>l.trim());
    const items=[]; let cur=null;
    for(const l of lines){
      if(/^(STEP)?\s*\d+[\.\s]/i.test(l)){if(cur)items.push(cur);cur={t:l.replace(/^(STEP)?\s*\d+[\.\s:：]*/i,"").trim(),d:[]};}
      else if(cur)cur.d.push(l);
    }
    if(cur)items.push(cur);
    return items.slice(0,3).map((s,i)=>`<div class="s-item"><div class="s-wrap"><div class="s-num">${i+1}</div>${i<2?'<div class="s-line"></div>':""}</div><div class="s-body"><div class="s-title">${s.t}</div><p class="s-desc">${s.d.join(" ")}</p></div></div>`).join("");
  })();

  const faqs = (()=>{
    const lines=(res.faq||"").split("\n").filter(l=>l.trim());
    const items=[]; let cur=null;
    for(const l of lines){
      if(/^Q[:：]/.test(l)){if(cur)items.push(cur);cur={q:l.replace(/^Q[:：]\s*/,""),a:""};}
      else if(/^A[:：]/.test(l)&&cur){cur.a=l.replace(/^A[:：]\s*/,"");}
      else if(cur&&!cur.a)cur.q+=l;
      else if(cur)cur.a+=l;
    }
    if(cur)items.push(cur);
    if(!items.length)return`<div class="faq-item"><div class="faq-q">Q. 保険は使えますか？</div><div class="faq-a">A. 骨折・脱臼・捻挫・打撲・挫傷に健康保険が適用できます。</div></div>`;
    return items.slice(0,4).map(f=>`<div class="faq-item"><div class="faq-q">Q. ${f.q}</div><div class="faq-a">A. ${f.a}</div></div>`).join("");
  })();

  const FONTS = {
    "noto-sans":    { name:"Noto Sans JP",       css:"'Noto Sans JP',sans-serif",      url:"https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@500&display=swap",      weight:500 },
    "zen-kaku":     { name:"Zen Kaku Gothic New", css:"'Zen Kaku Gothic New',sans-serif",url:"https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@500&display=swap", weight:500 },
    "mplus":        { name:"M PLUS 1p",           css:"'M PLUS 1p',sans-serif",          url:"https://fonts.googleapis.com/css2?family=M+PLUS+1p:wght@500&display=swap",           weight:500 },
    "shippori":     { name:"Shippori Mincho",     css:"'Shippori Mincho',serif",         url:"https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500&display=swap",     weight:500 },
    "noto-serif":   { name:"Noto Serif JP",       css:"'Noto Serif JP',serif",           url:"https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400&display=swap",       weight:400 },
    "kaisei":       { name:"Kaisei Decol",        css:"'Kaisei Decol',serif",            url:"https://fonts.googleapis.com/css2?family=Kaisei+Decol:wght@400&display=swap",        weight:400 },
  };
  const font = FONTS[D.heroFont] || FONTS["noto-sans"];

  // heroStyle は img タグ方式に変更したため不要

  return `<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>${form.clinicName||"整骨院"}</title><link rel="preconnect" href="https://fonts.googleapis.com"><link href="${font.url}" rel="stylesheet"><style>

const CYCLE = { "●":"▲", "▲":"-", "-":"●" };

function ScheduleEditor({ schedule, slotLabels, hoursNote, onChange, onLabelChange, onNoteChange, onAddRow, onRemoveRow, accentColor }) {
  const C = accentColor || "#3a6351";
  const cellStyle = v => ({
    width: 32, height: 32, borderRadius: 6, cursor:"pointer",
    fontSize: 13, fontWeight: 700, border:"none",
    background: v==="●" ? C : v==="▲" ? "#e8a020" : "#e8e8e8",
    color: v==="-" ? "#aaa" : "#fff",
    display:"flex", alignItems:"center", justifyContent:"center",
    userSelect:"none", flexShrink:0
  });

  return (
    <div>
      <div style={{ display:"flex", gap:10, marginBottom:10, fontSize:11, color:"#888", alignItems:"center" }}>
        <span>タップで切替：</span>
        {[["●","営業",C],["▲","短縮","#e8a020"],["-","休み","#ccc"]].map(([v,l,bg])=>(
          <span key={v} style={{ display:"flex", alignItems:"center", gap:3 }}>
            <span style={{ width:16, height:16, borderRadius:4, background:bg, display:"inline-block" }}/>
            <span>{v} {l}</span>
          </span>
        ))}
      </div>
      <div style={{ display:"flex", gap:4, marginBottom:6, paddingLeft:90 }}>
        {DAYS.map(d => (
          <div key={d} style={{ width:32, textAlign:"center", fontSize:12, fontWeight:700, color:"#555", flexShrink:0 }}>{d}</div>
        ))}
      </div>
      {schedule.map((row, r) => (
        <div key={r} style={{ display:"flex", alignItems:"center", gap:4, marginBottom:6 }}>
          <input value={slotLabels[r] || ""} onChange={e => onLabelChange(r, e.target.value)} placeholder="9:00〜12:00"
            style={{ width:82, fontSize:11, border:"1px solid #ddd", borderRadius:6, padding:"5px 6px", fontFamily:"inherit", flexShrink:0 }}/>
          {row.map((v, c) => (
            <div key={c} style={cellStyle(v)} onClick={() => onChange(r, c, CYCLE[v]||"●")}>
              {v==="-" ? "休" : v}
            </div>
          ))}
          {schedule.length > 1 && (
            <button onClick={() => onRemoveRow(r)}
              style={{ marginLeft:4, background:"none", border:"none", color:"#ccc", cursor:"pointer", fontSize:16, lineHeight:1, padding:"2px 4px" }}>×</button>
          )}
        </div>
      ))}
      {schedule.length < 4 && (
        <button onClick={onAddRow}
          style={{ marginTop:4, fontSize:11, color:"#888", background:"none", border:"1px dashed #ddd", borderRadius:6, padding:"5px 12px", cursor:"pointer", fontFamily:"inherit" }}>
          + 時間帯を追加
        </button>
      )}

function ColorPick({ value, onChange }) {
  const toHsv = hex => {
    let r=parseInt(hex.slice(1,3),16)/255, g=parseInt(hex.slice(3,5),16)/255, b=parseInt(hex.slice(5,7),16)/255;
    const mx=Math.max(r,g,b), mn=Math.min(r,g,b), d=mx-mn;
    let h=0, s=mx===0?0:d/mx*100, v=mx*100;
    if(d>0){if(mx===r)h=(g-b)/d%6; else if(mx===g)h=(b-r)/d+2; else h=(r-g)/d+4; h=h*60; if(h<0)h+=360;}
    return {h:Math.round(h*10)/10, s, v};
  };
  const toHex = (h,s,v) => {
    s/=100; v/=100;
    const f=n=>{const k=(n+h/60)%6; return v-v*s*Math.max(0,Math.min(k,4-k,1));};
    return '#'+[f(5),f(3),f(1)].map(x=>Math.round(Math.max(0,Math.min(255,x*255))).toString(16).padStart(2,'0')).join('');
  };
  const [hsv, setHsv] = useState(()=>toHsv(value));
  const [hexTxt, setHexTxt] = useState(value);
  const sqRef = useRef();
  const isDragSq = useRef(false);
  const hsvRef = useRef(hsv);
  hsvRef.current = hsv;

  useEffect(() => { setHsv(toHsv(value)); setHexTxt(value); }, [value]);

  const commitSq = (cx, cy) => {
    if (!sqRef.current) return;
    const r = sqRef.current.getBoundingClientRect();
    const s = Math.max(0, Math.min(100, (cx - r.left) / r.width  * 100));
    const v = Math.max(0, Math.min(100, (1 - (cy - r.top) / r.height) * 100));
    const next = { ...hsvRef.current, s, v };
    const hex  = toHex(next.h, next.s, next.v);
    setHsv(next); setHexTxt(hex); onChange(hex);
  };

  useEffect(() => {
    const mv = e => { if (isDragSq.current) commitSq(e.clientX, e.clientY); };
    const up = () => { isDragSq.current = false; };
    window.addEventListener('mousemove', mv);
    window.addEventListener('mouseup',  up);
    return () => { window.removeEventListener('mousemove', mv); window.removeEventListener('mouseup', up); };
  }, []);

  const onHueRange = e => {
    const next = { ...hsv, h: +e.target.value };
    const hex  = toHex(next.h, next.s, next.v);
    setHsv(next); setHexTxt(hex); onChange(hex);
  };
  const onHexInput = e => {
    const v = e.target.value; setHexTxt(v);
    if (/^#[0-9a-fA-F]{6}$/.test(v)) { setHsv(toHsv(v)); onChange(v); }
  };

  return (
    <div style={{ width:"100%" }}>
      <div ref={sqRef}
        onMouseDown={e => { e.preventDefault(); isDragSq.current = true; commitSq(e.clientX, e.clientY); }}
        style={{ position:"relative", width:"100%", paddingTop:"62%", borderRadius:8, overflow:"hidden", cursor:"crosshair",
          background:`hsl(${hsv.h},100%,50%)`, userSelect:"none", boxShadow:"0 1px 4px rgba(0,0,0,0.18)" }}>
        <div style={{position:"absolute",inset:0,background:"linear-gradient(to right,#fff,transparent)"}}/>
        <div style={{position:"absolute",inset:0,background:"linear-gradient(to bottom,transparent,#000)"}}/>
        <div style={{ position:"absolute", left:`${Math.round(hsv.s)}%`, top:`${Math.round(100-hsv.v)}%`,
          width:14, height:14, borderRadius:"50%", border:"2.5px solid #fff",
          boxShadow:"0 0 0 1px rgba(0,0,0,0.5), 0 1px 4px rgba(0,0,0,0.3)",
          transform:"translate(-50%,-50%)", pointerEvents:"none" }}/>
      </div>
      <div style={{position:"relative", marginTop:10, height:14}}>
        <div style={{ position:"absolute", inset:0, borderRadius:7,
          background:"linear-gradient(to right,#f00,#ff0,#0f0,#0ff,#00f,#f0f,#f00)" }}/>
        <input type="range" min={0} max={360} step={1} value={Math.round(hsv.h)} onChange={onHueRange}
          style={{ position:"absolute", inset:0, width:"100%", height:"100%", opacity:0, cursor:"pointer", margin:0, padding:0 }}/>
        <div style={{ position:"absolute", top:"50%", left:`${hsv.h/360*100}%`,
          width:16, height:16, borderRadius:"50%", border:"2.5px solid #fff",
          boxShadow:"0 0 0 1px rgba(0,0,0,0.4), 0 1px 3px rgba(0,0,0,0.3)",
          background:`hsl(${hsv.h},100%,50%)`, transform:"translate(-50%,-50%)", pointerEvents:"none" }}/>
      </div>
      <div style={{display:"flex", alignItems:"center", gap:8, marginTop:10}}>
        <div style={{ width:36, height:36, borderRadius:8, flexShrink:0, background:value, border:"2px solid #ddd", boxShadow:"0 1px 3px rgba(0,0,0,0.18)" }}/>
        <input type="text" value={hexTxt} onChange={onHexInput} maxLength={7} spellCheck={false} placeholder="#000000"
          style={{ flex:1, fontSize:"13px", fontFamily:"monospace", border:"1px solid #ddd", borderRadius:6, padding:"7px 10px", outline:"none", color:"#333" }}/>
      </div>
    </div>
  );
}

  const autoFill = async () => {
    const url = urlInput.trim();
    if (!url) { setUrlErr("URLを入力してください"); return; }
    setUrlErr(""); setUrlLoading(true);
    try {
      // 広告追跡パラメータを除去してクリーンなURLにする
      let cleanUrl = url;
      try {
        const u = new URL(url);
        ["gad_source","gad_campaignid","gbraid","gclid","fbclid","utm_source","utm_medium","utm_campaign","utm_term","utm_content"].forEach(p => u.searchParams.delete(p));
        cleanUrl = u.toString();
      } catch(e) {}

      // CORSプロキシ経由でサイトHTMLを取得（複数プロキシでフォールバック）
      const proxies = [
        `https://corsproxy.io/?${encodeURIComponent(cleanUrl)}`,
        `https://api.allorigins.win/get?url=${encodeURIComponent(cleanUrl)}`,
        `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(cleanUrl)}`,
      ];
      let html = "";
      for (const proxyUrl of proxies) {
        try {
          const proxyRes = await fetch(proxyUrl);
          if (!proxyRes.ok) continue;
          const ct = proxyRes.headers.get("content-type") || "";
          if (ct.includes("application/json")) {
            const j = await proxyRes.json();
            html = j.contents || "";
          } else {
            html = await proxyRes.text();
          }
          if (html) break;
        } catch(e) { continue; }
      }
      if (!html) throw new Error("サイトの取得に失敗しました。URLを確認するか手動で入力してください。");

      // HTMLタグを除去してテキストだけ抽出（長すぎる場合は先頭8000字に絞る）
      const text = html
        .replace(/<style[\s\S]*?<\/style>/gi, "")
        .replace(/<script[\s\S]*?<\/script>/gi, "")
        .replace(/<[^>]+>/g, " ")
        .replace(/\s+/g, " ")
        .trim()
        .slice(0, 8000);

      // Claude APIでJSON抽出（ツールなし）
      const prompt = `以下は整骨院・接骨院のウェブサイトのテキストです。このテキストから情報を読み取り、JSON形式で返してください。

{"clinicName":"院名","area":"都道府県市区町村","tel":"電話番号","address":"郵便番号含む住所","access":"最寄り駅など","directorName":"院長名","directorProfile":"院長経歴・資格","symptoms":"得意症状をカンマ区切り","strengths":"特徴・強みをカンマ区切り","price":"料金メニュー改行区切り","lineId":"LINE ID（@から始まる）","hoursNote":"休診日・営業時間注記","target":"ターゲット患者層"}

サイトテキスト：
${text}`;

      const apiRes = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          messages: [{ role: "user", content: prompt }]
        })
      });
      const raw = await apiRes.text();
      if (apiRes.status === 529) throw new Error("APIが混雑しています。30秒ほど待ってから再試行してください。");
      if (!apiRes.ok) throw new Error(`APIエラー (HTTP ${apiRes.status})`);
      const d = JSON.parse(raw);

      setForm(next);

      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:body}]})
    });
    const raw = await res.text();
    setDbgLog(p=>p+`\n[${label}] ${res.status}\n${raw.slice(0,200)}\n---`);
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    const d = JSON.parse(raw);
    if(d.error) throw new Error(d.error.message);
    return d.content?.map(i=>i.text||"").join("")||"";
  };

  const generate = async () => {
    if(!form.clinicName||!form.area){setGErr("院名とエリアは必須です");return;}
    setGErr(""); setDbgLog(""); setRunning(true); setDone(false);
    setResults({}); setErrors({});
    setStatuses(Object.fromEntries(SECTIONS.map(s=>[s.key,"idle"])));
    for(const s of SECTIONS){
      setStatuses(p=>({...p,[s.key]:"loading"}));
      try{
        const t = await callAPI(s.label, s.prompt);
        setResults(p=>({...p,[s.key]:t}));
        setStatuses(p=>({...p,[s.key]:"done"}));
      }catch(e){
        setErrors(p=>({...p,[s.key]:e.message}));
        setStatuses(p=>({...p,[s.key]:"error"}));
      }
    }
    setRunning(false); setDone(true); setTab("preview");
  };

  const download = () => {
    const html = buildHtml(form, results, heroImg, design, directorImg, clinicImg);
    const encoded = "data:text/html;charset=utf-8," + encodeURIComponent(html);
    const a = document.createElement("a");
    a.href = encoded;
    a.download = `${form.clinicName||"lp"}.html`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  };

  const progress = SECTIONS.filter(s=>statuses[s.key]==="done").length;
  const started  = SECTIONS.some(s=>statuses[s.key]!=="idle");

  const I = {width:"100%",background:"#fff",border:"1px solid #ddd",borderRadius:"8px",padding:"9px 12px",color:"#1a1a1a",fontSize:"13px",fontFamily:"inherit",outline:"none",boxSizing:"border-box"};
  const L = {display:"block",fontSize:"12px",fontWeight:600,color:"#444",marginBottom:"5px"};
  const TB = ok=>({padding:"9px 14px",fontSize:"12px",fontWeight:600,cursor:"pointer",border:"none",background:ok?"#1a1a1a":"transparent",color:ok?"#fff":"#888",borderRadius:"8px",fontFamily:"inherit",whiteSpace:"nowrap"});

  return(<>
    <style>{`
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&display=swap');
      *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
      body{font-family:'Noto Sans JP',-apple-system,BlinkMacSystemFont,'Hiragino Sans',sans-serif;background:#f4f5f7}
      @keyframes spin{to{transform:rotate(360deg)}}
      @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
      input:focus,textarea:focus{border-color:#3a6351!important;box-shadow:0 0 0 3px rgba(58,99,81,0.1);outline:none}
      ::-webkit-scrollbar{width:5px}
      ::-webkit-scrollbar-thumb{background:#ddd;border-radius:3px}
    `}</style>

    <div style={{display:"grid",gridTemplateColumns:"300px 1fr",minHeight:"100vh"}}>
      {/* 左：フォーム */}
      <div style={{background:"#fff",borderRight:"1px solid #e8e8e8",display:"flex",flexDirection:"column",minWidth:0,overflow:"hidden"}}>
        <div style={{padding:"12px 14px",borderBottom:"1px solid #f0f0f0"}}>
          <div style={{fontWeight:700,fontSize:"13px"}}>🏥 整骨院 LP Generator</div>
          <div style={{fontSize:"10px",color:"#aaa",marginTop:"1px"}}>Powered by Claude</div>
          <button onClick={loadDemo} style={{marginTop:"8px",width:"100%",background:"#f4f4f2",color:"#444",border:"1px solid #e0e0e0",borderRadius:"8px",padding:"7px",fontSize:"11px",fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>
            👁 デモデータでプレビュー確認
          </button>

          {/* URL自動入力 */}
          <div style={{marginTop:"10px",padding:"10px",background:"#f0f7ff",border:"1px solid #c8def7",borderRadius:"10px"}}>
            <div style={{fontSize:"11px",fontWeight:700,color:"#1a5fa8",marginBottom:"4px"}}>🔗 URLから自動入力</div>
            <div style={{fontSize:"10px",color:"#5a80a8",marginBottom:"7px",lineHeight:1.4}}>整骨院のURLを貼ると情報を自動取得します</div>
            <div style={{display:"flex",gap:"5px"}}>
              <input
                value={urlInput} onChange={e=>{setUrlInput(e.target.value);setUrlErr("");}}
                placeholder="https://example.com"
                style={{flex:1,minWidth:0,fontSize:"11px",border:"1px solid #b8d0ee",borderRadius:"6px",padding:"7px 8px",fontFamily:"inherit",outline:"none",background:"#fff"}}
                onKeyDown={e=>{if(e.key==="Enter"&&!urlLoading)autoFill();}}
              />
              <button onClick={autoFill} disabled={urlLoading}
                style={{flexShrink:0,background:urlLoading?"#a0bcd8":"#1a5fa8",color:"#fff",border:"none",borderRadius:"6px",padding:"7px 10px",fontSize:"11px",fontWeight:700,cursor:urlLoading?"not-allowed":"pointer",fontFamily:"inherit",display:"flex",alignItems:"center",gap:"4px"}}>
                {urlLoading
                  ? <><div style={{width:11,height:11,border:"2px solid rgba(255,255,255,0.4)",borderTop:"2px solid #fff",borderRadius:"50%",animation:"spin .8s linear infinite"}}/></>
                  : "取得"}
              </button>
            </div>
            {urlErr && <div style={{marginTop:"5px",fontSize:"10px",color:"#cc3333",background:"#fff5f5",border:"1px solid #f0c0c0",borderRadius:"5px",padding:"5px 7px"}}>{urlErr}</div>}
            {Object.keys(autoFilled).length>0 && !urlLoading && (
              <div style={{marginTop:"5px",fontSize:"10px",color:"#2a7a3a",background:"#f0fff4",border:"1px solid #9dd4b0",borderRadius:"5px",padding:"5px 7px"}}>
                ✅ {Object.keys(autoFilled).length}項目を自動入力。<span style={{color:"#c07000",fontWeight:700}}>黄色</span>の欄を確認してください
              </div>
            )}
          </div>
        </div>

        <div style={{padding:"14px 16px",overflowY:"auto",flex:1}}>
          <div style={{marginBottom:"16px",display:"flex",flexDirection:"column",gap:"10px"}}>
            {[
              { label:"TOP写真",  img:heroImg,      ref_:fileRef,         setter:setHeroImg,     icon:"📸", hint:"ヒーロー背景" },
              { label:"院長写真", img:directorImg,  ref_:directorFileRef, setter:setDirectorImg, icon:"👨‍⚕️", hint:"院長あいさつ欄に表示" },
              { label:"院内写真", img:clinicImg,    ref_:clinicFileRef,   setter:setClinicImg,   icon:"🏥", hint:"アクセス欄・地図の上に表示" },
            ].map(({label,img,ref_,setter,icon,hint})=>(
              <div key={label}>
                <label style={L}>{label}<span style={{fontWeight:400,color:"#aaa",marginLeft:6,fontSize:"11px"}}>{hint}</span></label>
                <div onClick={()=>ref_.current.click()} style={{border:"2px dashed #ddd",borderRadius:"10px",padding:"10px 14px",textAlign:"center",cursor:"pointer",background:img?"#f0f6ff":"#fafafa",display:"flex",alignItems:"center",gap:"10px"}}>
                  {img
                    ?<><img src={img} alt="" style={{width:"52px",height:"52px",objectFit:"cover",borderRadius:"6px",flexShrink:0}}/><div style={{textAlign:"left"}}><div style={{fontSize:"12px",fontWeight:600,color:"#3a6351"}}>✓ 設定済</div><div style={{fontSize:"11px",color:"#aaa"}}>クリックで変更</div></div></>
                    :<><div style={{fontSize:"20px"}}>{icon}</div><div style={{fontSize:"12px",color:"#aaa"}}>クリックしてアップロード</div></>
                  }
                  <input ref={ref_} type="file" accept="image/*" onChange={makeUploader(setter)} style={{display:"none"}}/>
                </div>
              </div>
            ))}
          </div>

          <div style={{display:"flex",flexDirection:"column",gap:"12px"}}>
            {[
              {n:"clinicName",l:"院名 *",           p:"例：めぐり整骨院",              t:"i"},
              {n:"area",      l:"エリア *",          p:"例：宮城県岩沼市",              t:"i"},
              {n:"tel",       l:"電話番号",           p:"例：0223-00-0000",             t:"i"},
              {n:"address",   l:"住所",              p:"例：〒989-2433 岩沼市中央1-2",  t:"i"},
              {n:"access",    l:"アクセス",           p:"例：JR岩沼駅 徒歩5分",          t:"i"},
              {n:"directorName",l:"院長名",           p:"例：田中 誠",                  t:"i"},
              {n:"symptoms",  l:"得意症状",           p:"例：腰痛・肩こり・交通事故",      t:"i"},
              {n:"lineId",    l:"LINE ID",           p:"例：@meguri-seikotsu",          t:"i"},
              {n:"target",    l:"ターゲット",          p:"例：30〜50代の腰痛持ち女性",     t:"i"},
              {n:"directorProfile",l:"院長プロフィール",p:"例：柔道整復師歴15年",          t:"a"},
              {n:"strengths", l:"強み・特徴",          p:"例：完全個室・予約制",           t:"a"},
              {n:"price",     l:"料金・メニュー",      p:"例：初診3,300円\n骨盤矯正5,500円〜",t:"a"},
            ].map(f=>(
              <div key={f.n}>
                <label style={L}>{f.l}</label>
                {f.t==="i"
                  ?<input name={f.n} value={form[f.n]} onChange={e=>{change(e);setAutoFilled(p=>{const n={...p};delete n[f.n];return n;});}} placeholder={f.p} style={{...I,background:autoFilled[f.n]?"#fffbe6":"#fff",border:autoFilled[f.n]?"1px solid #e8a020":"1px solid #ddd"}}/>
                  :<textarea name={f.n} value={form[f.n]} onChange={e=>{change(e);setAutoFilled(p=>{const n={...p};delete n[f.n];return n;});}} placeholder={f.p} rows={2} style={{...I,resize:"vertical",background:autoFilled[f.n]?"#fffbe6":"#fff",border:autoFilled[f.n]?"1px solid #e8a020":"1px solid #ddd"}}/>
                }
              </div>
            ))}
          </div>

          <div style={{marginTop:"16px",paddingTop:"16px",borderTop:"1px solid #f0f0f0"}}>
            <label style={L}>受付時間</label>
            <ScheduleEditor
              schedule={form.schedule} slotLabels={form.slotLabels} hoursNote={form.hoursNote}
              accentColor={design.colorMain}
              onChange={(r,c,v) => setForm(f=>{ const s=f.schedule.map(row=>[...row]); s[r][c]=v; return {...f,schedule:s}; })}
              onLabelChange={(r,v) => setForm(f=>{ const l=[...f.slotLabels]; l[r]=v; return {...f,slotLabels:l}; })}
              onNoteChange={v => setForm(f=>({...f,hoursNote:v}))}
              onAddRow={() => setForm(f=>({...f,schedule:[...f.schedule,Array(7).fill("-")],slotLabels:[...f.slotLabels,""]}))}
              onRemoveRow={r => setForm(f=>({...f,schedule:f.schedule.filter((_,i)=>i!==r),slotLabels:f.slotLabels.filter((_,i)=>i!==r)}))}
            />
          </div>

          {gErr&&<div style={{marginTop:"10px",fontSize:"12px",color:"#cc0000",padding:"8px 12px",background:"#fff5f5",borderRadius:"6px",border:"1px solid #ffd0d0"}}>{gErr}</div>}

          {dbgLog&&(
            <div style={{marginTop:"12px"}}>
              <button onClick={()=>setShowDbg(!showDbg)} style={{background:"none",border:"1px solid #e0e0e0",borderRadius:"6px",padding:"4px 10px",fontSize:"11px",color:"#aaa",cursor:"pointer",fontFamily:"inherit"}}>
                {showDbg?"▼ ログを隠す":"▶ デバッグログ"}
              </button>
              {showDbg&&<pre style={{marginTop:"6px",fontSize:"10px",color:"#999",background:"#f8f8f8",padding:"8px",borderRadius:"6px",whiteSpace:"pre-wrap",wordBreak:"break-all",maxHeight:"160px",overflowY:"auto"}}>{dbgLog}</pre>}
            </div>
          )}
        </div>

        <div style={{padding:"14px 16px",borderTop:"1px solid #f0f0f0"}}>
          <button onClick={generate} disabled={running} style={{width:"100%",background:running?"#e8e8e8":"#1a1a1a",color:running?"#aaa":"#fff",border:"none",borderRadius:"10px",padding:"13px",fontSize:"14px",fontWeight:700,cursor:running?"not-allowed":"pointer",fontFamily:"inherit",transition:"all .2s"}}>
            {running?`生成中... ${progress} / ${SECTIONS.length}`:"▶ LP全文を生成する"}
          </button>
          {running&&<div style={{marginTop:"8px",background:"#eee",borderRadius:"4px",height:"3px"}}><div style={{background:"#3a6351",height:"100%",width:`${progress/SECTIONS.length*100}%`,transition:"width .5s ease",borderRadius:"4px"}}/></div>}
          {done&&<button onClick={download} style={{marginTop:"8px",width:"100%",background:"#fff",color:"#1a1a1a",border:"2px solid #1a1a1a",borderRadius:"10px",padding:"11px",fontSize:"13px",fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>⬇ HTMLをダウンロード</button>}
        </div>
      </div>

      {/* 右：タブ */}
      <div style={{display:"flex",flexDirection:"column"}}>
        <div style={{background:"#fff",borderBottom:"1px solid #e8e8e8",padding:"8px 16px",display:"flex",gap:"4px",alignItems:"center"}}>
          <button onClick={()=>setTab("copy")}    style={TB(tab==="copy")}>📝 コピー編集</button>
          <button onClick={()=>setTab("design")}  style={TB(tab==="design")}>🎨 デザイン</button>
          <button onClick={()=>setTab("preview")} style={TB(tab==="preview")}>🖥 LPプレビュー</button>
          {done&&tab==="preview"&&<button onClick={download} style={{marginLeft:"auto",background:"#1a1a1a",color:"#fff",border:"none",borderRadius:"8px",padding:"8px 16px",fontSize:"12px",fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>⬇ HTML</button>}
        </div>

        {tab==="copy"&&(
          <div style={{flex:1,overflowY:"auto",padding:"16px",background:"#f4f5f7"}}>
            {!started?(
              <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"400px",gap:"12px"}}>
                <div style={{fontSize:"48px"}}>📋</div>
                <div style={{fontSize:"14px",color:"#bbb"}}>左のフォームを入力して生成、またはデモで確認</div>
              </div>
            ):SECTIONS.map(s=>{
              const st=statuses[s.key];
              return(
                <div key={s.key} style={{background:"#fff",border:"1px solid",borderColor:st==="done"?"#e0e0e0":st==="error"?"#ffd0d0":"#eee",borderRadius:"10px",marginBottom:"10px",overflow:"hidden"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 14px",background:st==="done"?"#fafafa":st==="error"?"#fff5f5":"#f8f8f8",borderBottom:"1px solid #eee"}}>
                    <div style={{display:"flex",alignItems:"center",gap:"8px"}}>
                      <span style={{width:8,height:8,borderRadius:"50%",background:st==="done"?"#3a6351":st==="loading"?"#e8a020":st==="error"?"#ff3333":"#ddd",animation:st==="loading"?"pulse 1s infinite":"none",display:"inline-block"}}/>
                      <span style={{fontSize:"13px",fontWeight:600}}>{s.label}</span>
                    </div>
                    {st==="done"&&results[s.key]&&(
                      <button onClick={async()=>{await navigator.clipboard.writeText(results[s.key]);}} style={{background:"#fff",color:"#3a6351",border:"1px solid #3a6351",borderRadius:"6px",padding:"3px 10px",fontSize:"11px",cursor:"pointer",fontFamily:"inherit"}}>コピー</button>
                    )}
                  </div>
                  <div style={{padding:"10px 14px",minHeight:"48px"}}>
                    {st==="loading"&&<div style={{display:"flex",alignItems:"center",gap:"8px"}}><div style={{width:14,height:14,border:"2px solid #e0e0e0",borderTop:"2px solid #3a6351",borderRadius:"50%",animation:"spin .8s linear infinite"}}/><span style={{fontSize:"13px",color:"#aaa"}}>生成中...</span></div>}
                    {st==="done"&&(
                      <textarea value={results[s.key]||""} onChange={e=>editResult(s.key,e.target.value)}
                        style={{width:"100%",minHeight:"100px",fontSize:"13px",lineHeight:"1.85",color:"#1a1a1a",fontFamily:"inherit",border:"1px solid #e8e8e8",borderRadius:"6px",padding:"10px",resize:"vertical",outline:"none",background:"#fafafa",boxSizing:"border-box"}}/>
                    )}
                    {st==="error"&&<div style={{fontSize:"12px",color:"#cc0000"}}>⚠ {errors[s.key]}</div>}
                    {st==="idle"&&<span style={{fontSize:"12px",color:"#ddd"}}>待機中</span>}
                  </div>
                </div>
              );
            })}
          </div>
        )}

        {tab==="design"&&(
          <div style={{flex:1,overflowY:"auto",background:"#f9f9f7"}}>
            <div style={{background:"#fff",borderBottom:"1px solid #f0f0f0",padding:"12px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div>
                <div style={{fontSize:"13px",fontWeight:700}}>デザイン調整</div>
                <div style={{fontSize:"11px",color:"#aaa",marginTop:"2px"}}>変更するとプレビューにリアルタイム反映されます</div>
              </div>
              <button onClick={()=>setTab("preview")} style={{background:"#1a1a1a",color:"#fff",border:"none",borderRadius:8,padding:"7px 14px",fontSize:"12px",fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>
                プレビューを見る →
              </button>
            </div>
            <DesignPanel design={design} setDesign={setDesign}/>
          </div>
        )}

        {tab==="preview"&&(
          <div style={{flex:1}}>
            {!started?(
              <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"400px",color:"#ccc",gap:"12px"}}>
                <div style={{fontSize:"48px"}}>🖥</div>
                <div style={{fontSize:"14px",color:"#bbb"}}>生成またはデモボタンでプレビューが表示されます</div>
              </div>
            ):(
              <iframe srcDoc={buildHtml(form,results,heroImg,design,directorImg,clinicImg)} style={{width:"100%",height:"100%",minHeight:"calc(100vh - 49px)",border:"none"}} title="LP"/>
            )}
          </div>
        )}
      </div>
    </div>
  </>);
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
